<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VirtualCA — Intelligent Accounting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { display: ['Playfair Display', 'serif'] }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Auto-detect new deployments and reload
      (function() {
        var currentJS = null;
        function checkVersion() {
          fetch('/asset-manifest.json?t=' + Date.now())
            .then(function(r) { return r.json(); })
            .then(function(m) {
              var js = m.files && m.files['main.js'];
              if (!currentJS) { currentJS = js; return; }
              if (js && js !== currentJS) { window.location.reload(); }
            }).catch(function(){});
        }
        setTimeout(function() { checkVersion(); setInterval(checkVersion, 60000); }, 5000);
      })();
    </script>
  </body>
</html>
